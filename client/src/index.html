<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AGDATA Rewards Portal</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="AGDATA Rewards Portal - Manage your reward points, track achievements, and redeem exclusive benefits.">
  <meta name="theme-color" content="#4B7B32">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Fonts - Segoe UI fallback with system fonts -->
  <style>
    /* Critical CSS for initial load */
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #FFFFFF;
    }
    
    /* Initial loading state */
    .app-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FFFFFF;
      z-index: 9999;
    }
    
    .app-loading .logo {
      width: 60px;
      height: 60px;
      margin-bottom: 1rem;
      color: #4B7B32;
    }
    
    .app-loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #E5E7EB;
      border-top-color: #4B7B32;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <app-root>
    <!-- Loading state shown while Angular bootstraps -->
    <div class="app-loading">
      <svg class="logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 4L4 12V28L20 36L36 28V12L20 4Z" fill="currentColor" opacity="0.2"/>
        <path d="M20 4L4 12V28L20 36L36 28V12L20 4Z" stroke="currentColor" stroke-width="2"/>
        <path d="M20 10L10 15V25L20 30L30 25V15L20 10Z" fill="currentColor"/>
      </svg>
      <div class="spinner"></div>
    </div>
  </app-root>
</body>
</html>
